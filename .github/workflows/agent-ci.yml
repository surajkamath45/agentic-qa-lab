name: Agentic QA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Daily autonomous health check

jobs:
  agent-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install agent-framework playwright
          playwright install --with-deps chromium

      - name: Run Autonomous QA Squad
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 2026: The CI goal is often dynamic or based on the PR changes
          python src/main.py "Verify the main purchase flow and heal any broken selectors"

      - name: Upload Healed Scripts & Logs
        uses: actions/upload-artifact@v4
        with:
          name: squad-output
          path: output/
